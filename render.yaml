databases:
  - name: harbor-key-db
    plan: free
    databaseName: harbor_key
    user: harbor_key

services:
  - type: web
    name: harbor-key-realty
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: harbor-key-db
          property: connectionString
      - key: STORYCHIEF_WEBHOOK_KEY
        sync: false
