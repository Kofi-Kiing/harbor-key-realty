<article class="post-card">
  <a class="post-image" href="{{ url_for('blog_detail', slug=post.slug) }}">
    {% if post.image %}
      <img src="{{ post.image }}" alt="{{ post.title }}" loading="lazy">
    {% else %}
      <span class="post-image-placeholder" aria-hidden="true">H&amp;K</span>
    {% endif %}
    {% if post.category %}<span class="post-badge">{{ post.category }}</span>{% endif %}
  </a>
  <div class="post-body">
    <p class="post-meta">{{ post.date|prettydate }} · {{ post.author }}</p>
    <h3><a href="{{ url_for('blog_detail', slug=post.slug) }}">{{ post.title }}</a></h3>
    <p class="post-excerpt">{{ post.excerpt }}</p>
    <a class="text-link" href="{{ url_for('blog_detail', slug=post.slug) }}">Read post <span>→</span></a>
  </div>
</article>
